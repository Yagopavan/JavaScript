<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>

<body>        
    </header>
    <div class="cad">

        <br>
        <div class="logo"><img src="img/logo2.png" alt="logo" class="logo"></div>
                <h2>Cadastro de Usuário</h2>
        <form>

            <input type="text" id="nome" placeholder="Digite seu nome"><br><br> <!--Utilizei o placeholder para poder colocar o texto dentro do input-->

            <input type="text" id="email" placeholder="Digite seu email"><br><br>
            <alert id="alerta"></alert>
            <div class="senha1"><!-- Criei essa div para ajustar o icone de revelar a senha.-->
                <i class="bi bi-eye-fill icone" id="botaosenha"></i> <!--icone para mostrar e esconder senha-->
                <input type="password" id="senha" placeholder="Digite sua senha"><br>
                <div id="forca-senha" style="font-size: 12px; margin-top: 5px;"></div><br>
            </div>

            <div class="senha2">
                <i class="bi bi-eye-fill icone" id="botaosenha2"></i>
                <input type="password" id="senha2" placeholder="Confirme sua senha"><br>
                <div id="confirmacao-senha" style="font-size: 12px; margin-top: 5px;"></div><br>
            </div>

            <div id="telefones">
                <input type="text" class="telefone" placeholder="Digite seu telefone" maxlength="15" oninput="this.value = formatarTelefone(this.value)"><br><br>
            </div>
            
            <button type="button" id="adicionar-telefone">+ Adicionar Telefone</button><br><br>

            <button type="button" id="cadastrar">Cadastrar</button>

            <p id="mensagem"></p>

        </form>
        
        <h3>Usuários Cadastrados</h3>
        <div id="lista-usuarios"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
