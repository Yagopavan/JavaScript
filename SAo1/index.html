<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="cad">
        <h2>Cadastro de Usuário</h2>
        <br>
        <form>

            <input type="text" id="nome" placeholder="Digite seu nome"><br><br>

            <input type="text" id="email" placeholder="Digite seu email"><br><br>
            <i class="bi bi-eye-fill icone" id="botaosenha"></i> <!--icone para mostrar e esconder senha-->
            <input type="password" id="senha" placeholder="Digite sua senha"><br><br>
            <i class="bi bi-eye-fill icone" id="botaosenha"></i>
            <input type="password" id="senha" placeholder="Confirme sua senha"><br><br>
            
            <input type="text" id="telefone" placeholder="Digite seu telefone"><br><br>

            <button type="button" id="cadastrar">Cadastrar</button>

            <p id="mensagem"></p>

        </form>
    </div>

    <script src="script.js"></script>

</body>

</html>
