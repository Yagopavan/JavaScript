<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades DOM</title>
    <link rel="stylesheet" href="atividades.css">
    <link rel="shortcut icon" href="/DOM/Copilot_20260203_115729.png" type="image/x-icon">
</head>
<body>
    <h2>Atividade 1 - Mudar cor do título</h2>
    <h1 id="titulo">Título</h1>
    <button id="azul">Azul</button>
    <button id="vermelho">Vermelho</button>
    <hr>
    <br>
    <h2>Atividade 2 - Mostrar e esconder mensagem</h2>
    <p id="mensagem">Opa</p>   
    <button id="botaoToggle">Mostrar/Esconder</button>
    <hr>
    <br>
    <H2>Atividade 3 - Contador de caracteres</H2>
    <textarea id="texto" placeholder="Digite algo..."></textarea>
    <p id="contador">Caracteres digitados: 0</p>
    <hr> 
    <br><h2>Atividade 4 - Contador de cliques</h2>
    <button id="botao">Clique aqui</button>
    <p id="resultado">Cliques: 0</p>
    <hr>
    <br> 
     <h2>Atividade 5 e 6 + Extra - Criar itens dinamicamente</h2>
  <input type="text" id="item" placeholder="Digite um item">
  <button id="adicionar">Adicionar</button>
  <ul id="lista"></ul>

     <script src="atividades.js"></script>
</body>
</html>
